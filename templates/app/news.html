{% extends "app/base.html" %}
{% block title %}{{ t('tab.news') }}{% endblock %}

{% block content %}
<section class="block">
	<p class="kicker">{{ t('news.sub') }}</p>
	<h2 class="title">{{ t('news.heading') }}</h2>
	<div class="grid grid-4">
		{% for n in news %}
		<a class="card news-card" href="{{ n.link }}" target="_blank" rel="noopener">
			{% if n.image_url %}
			<div class="thumb" style="background-image: url('{{ n.image_url }}');"></div>
			{% else %}
			<div class="thumb ph">
				<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
				<span>{{ t('news.noimg') }}</span>
			</div>
			{% endif %}
			<div class="body"><h3>{{ n.title }}</h3><div class="date">{{ n.date }}</div></div>
		</a>
		{% endfor %}
	</div>
</section>
{% endblock %}
