<!DOCTYPE HTML>
<html lang="{{ lang }}">

<head>
	<title>Focused Group — {% block title %}{% endblock %}</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="shortcut icon" href="https://img.icons8.com/dusk/64/null/internet--v1.png" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/dashboard.css') }}">
	{% block head %}{% endblock %}
</head>

<body class="app">

	<header class="app-header">
		<div class="inner">
			<a class="app-logo" href="{{ url_for('main.home') }}">Focused Group</a>
			<nav class="app-nav">
				<a href="{{ url_for('dash.overview') }}" class="{{ 'on' if tab == 'overview' }}">{{ t('tab.overview') }}</a>
				<a href="{{ url_for('dash.performance') }}" class="{{ 'on' if tab == 'performance' }}">{{ t('tab.performance') }}</a>
				<a href="{{ url_for('dash.model') }}" class="{{ 'on' if tab == 'model' }}">{{ t('tab.model') }}</a>
				<a href="{{ url_for('dash.news') }}" class="{{ 'on' if tab == 'news' }}">{{ t('tab.news') }}</a>
			</nav>
			<div class="app-right">
				<a href="{{ url_for('main.set_language', lang='zh' if lang == 'en' else 'en') }}">{{ t('lang.toggle') }}</a>
				<a href="https://github.com/Ynot1996/focusedgroup" target="_blank" aria-label="GitHub"><svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 014 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
			</div>
		</div>
	</header>

	<main class="app-main">
		{% block content %}{% endblock %}
	</main>

	<footer id="footer" class="dash-foot">
		<div class="inner">
			<span class="brand">Focused Group</span>
			<span class="note">{{ t('forecast.disclaimer') }}</span>
			<a href="https://github.com/Ynot1996/focusedgroup" target="_blank" aria-label="GitHub"><svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 014 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
		</div>
	</footer>

	{% block scripts %}{% endblock %}
</body>

</html>
