<!DOCTYPE HTML>
<html lang="{{ lang }}">

<head>
	<title>Focused Group — {% block title %}{% endblock %}</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="shortcut icon" href="https://img.icons8.com/dusk/64/null/internet--v1.png" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/main.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/dashboard.css') }}">
	{% block head %}{% endblock %}
</head>

<body class="app">

	<header class="app-header">
		<div class="inner">
			<a class="app-logo" href="{{ url_for('main.home') }}">Focused Group</a>
			<nav class="app-nav">
				<a href="{{ url_for('dash.overview') }}" class="{{ 'on' if tab == 'overview' }}">{{ t('tab.overview') }}</a>
				<a href="{{ url_for('dash.performance') }}" class="{{ 'on' if tab == 'performance' }}">{{ t('tab.performance') }}</a>
				<a href="{{ url_for('dash.model') }}" class="{{ 'on' if tab == 'model' }}">{{ t('tab.model') }}</a>
				<a href="{{ url_for('dash.news') }}" class="{{ 'on' if tab == 'news' }}">{{ t('tab.news') }}</a>
			</nav>
			<div class="app-right">
				<a href="{{ url_for('main.set_language', lang='zh' if lang == 'en' else 'en') }}">{{ t('lang.toggle') }}</a>
				<a href="https://github.com/Ynot1996/focusedgroup" target="_blank" aria-label="GitHub"><i class="icon brands fa-github" aria-hidden="true"></i></a>
			</div>
		</div>
	</header>

	<main class="app-main">
		{% block content %}{% endblock %}
	</main>

	<footer id="footer" class="dash-foot">
		<div class="inner">
			<span class="brand">Focused Group</span>
			<span class="note">{{ t('forecast.disclaimer') }}</span>
			<a href="https://github.com/Ynot1996/focusedgroup" target="_blank" aria-label="GitHub"><i class="icon brands fa-github" aria-hidden="true"></i></a>
		</div>
	</footer>

	{% block scripts %}{% endblock %}
</body>

</html>
